[build]
  command = "npm run build --prefix frontend"
  publish = "frontend/dist"
  functions = "netlify/functions"

# Proxy frontend API requests directly to our local backend via ngrok
[[redirects]]
  from = "/api/*"
  to = "https://tycoon-anybody-online.ngrok-free.dev/api/:splat"
  status = 200
  force = true

# Support standard single-page React router path history fallbacks
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
